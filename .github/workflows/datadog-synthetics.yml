# This workflow triggers Datadog Synthetic tests within your Datadog organisation
# For more information on running Synthetic tests within your GitHub workflows see: https://docs.datadoghq.com/synthetics/cicd_integrations/github_actions/

name: Run Datadog Synthetic tests

on:
  workflow_dispatch: # Manual trigger only — requires DD_API_KEY and DD_APP_KEY secrets
  # Uncomment below once Datadog secrets are configured:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  synthetics:
    name: Run Synthetics
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Run Synthetic tests within your GitHub workflow.
    # For additional configuration options visit the action within the marketplace: https://github.com/marketplace/actions/datadog-synthetics-ci
    - name: Run Datadog Synthetic tests
      uses: DataDog/synthetics-ci-github-action@v4
      with:
        api_key: ${{ secrets.DD_API_KEY }}
        app_key: ${{ secrets.DD_APP_KEY }}
        test_search_query: 'tag:e2e-tests' # Modify this tag to suit your tagging strategy
        # Optional advanced configurations:
        datadog_site: datadoghq.com      # Switch to datadoghq.eu if you are on the EU instance
        fail_on_critical_errors: true    # Will automatically fail the pipeline if tests timeout or fail to launch
        fail_on_timeout: true            # Will automatically fail the pipeline if any test breaches timeout 
